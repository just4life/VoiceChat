services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: voicechat-app:latest
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - sqlite_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  ws:
    image: voicechat-app:latest
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      WS_PORT: 3001
    command: ["node", "server/ws-server.mjs"]
    ports:
      - "3001:3001"

volumes:
  sqlite_data:
